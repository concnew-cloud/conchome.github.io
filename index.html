<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Экранное время</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14; --surface: #161920; --border: #252830;
      --accent: #4ade80; --accent-dim: #1a3a25;
      --warn: #facc15; --warn-dim: #2d2a0a;
      --danger: #f87171; --danger-dim: #2d1010;
      --text: #e8eaf0; --muted: #5a5f70; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
    .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; }
    .header { text-align: center; margin-bottom: 8px; }
    .header h1 { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .header .date { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
    .timer-display { text-align: center; padding: 36px 0; }
    .timer-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .timer-value { font-family: 'Space Mono', monospace; font-size: 72px; font-weight: 700; color: var(--text); line-height: 1; transition: color 0.3s; }
    .timer-value.running { color: var(--accent); }
    .timer-value.warning { color: var(--warn); }
    .timer-value.over    { color: var(--danger); }
    .progress-wrap { margin-top: 24px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 8px; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s, background 0.3s; }
    .progress-fill.warning { background: var(--warn); }
    .progress-fill.over    { background: var(--danger); width: 100% !important; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; margin-top: 20px; }
    .status-badge.idle    { background: var(--border); color: var(--muted); }
    .status-badge.running { background: var(--accent-dim); color: var(--accent); }
    .status-badge.paused  { background: var(--warn-dim); color: var(--warn); }
    .status-badge.over    { background: var(--danger-dim); color: var(--danger); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .controls { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn-start { background: var(--accent); color: #0d1a12; }
    .btn-pause { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(250,204,21,0.2); }
    .btn-stop  { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .limit-row { display: flex; align-items: center; gap: 10px; margin-top: 16px; }
    .limit-label { font-size: 13px; color: var(--muted); flex: 1; }
    .limit-label span { display: block; font-size: 11px; opacity: 0.6; margin-top: 2px; }
    .limit-input-wrap { display: flex; align-items: center; gap: 6px; }
    .limit-btn { width: 32px; height: 32px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
    .limit-btn:hover { border-color: var(--accent); color: var(--accent); }
    .limit-value { font-family: 'Space Mono', monospace; font-size: 16px; min-width: 52px; text-align: center; }
    .log-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .log-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }
    .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .log-item:last-child { border-bottom: none; }
    .log-dur { font-family: 'Space Mono', monospace; color: var(--accent); }
    .pin-overlay { position: fixed; inset: 0; background: rgba(13,15,20,0.97); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .pin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; width: 100%; max-width: 320px; text-align: center; }
    .pin-title { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; }
    .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.15s; }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
    .pin-dot.error  { background: var(--danger); border-color: var(--danger); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pin-key { padding: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 18px; cursor: pointer; transition: all 0.1s; }
    .pin-key:hover { border-color: var(--accent); color: var(--accent); }
    .pin-key:active { transform: scale(0.95); }
    .pin-key.del { color: var(--muted); font-size: 14px; }
    .pin-error { font-size: 12px; color: var(--danger); margin-top: 12px; min-height: 18px; }
    .pin-skip { margin-top: 16px; font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; }
    .divider { height: 1px; background: var(--border); margin: 4px 0; }
    .alert { background: var(--danger-dim); border: 1px solid rgba(248,113,113,0.3); border-radius: 12px; padding: 14px 18px; font-size: 13px; color: var(--danger); display: flex; align-items: center; gap: 10px; }
    .btn-reset { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'Manrope', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); }
    .child-note { text-align: center; font-size: 12px; color: var(--muted); padding: 8px; }
    .db-error { background: var(--danger-dim); border: 1px solid rgba(248,113,113,0.3); border-radius: 12px; padding: 14px 18px; font-size: 12px; color: var(--danger); line-height: 1.6; }
    @media (max-width: 400px) { .timer-value { font-size: 56px; } .card { padding: 20px; } }
  </style>
</head>
<body>

<div class="pin-overlay" id="pinOverlay">
  <div class="pin-card">
    <div class="pin-title">Родительский доступ</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" style="visibility:hidden"></button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-skip" onclick="viewAsChild()">Просмотр без управления</div>
  </div>
</div>

<div class="container" id="app" style="display:none">
  <div class="header">
    <h1>Экранное время</h1>
    <div class="date" id="dateDisplay"></div>
  </div>

  <div class="db-error" id="dbError" style="display:none"></div>

  <div class="alert" id="overtimeAlert" style="display:none">
    <span style="font-size:18px">⚠️</span>
    <span>Дневной лимит превышён!</span>
  </div>

  <div class="card">
    <div class="timer-display">
      <div class="timer-label">Время за сегодня</div>
      <div class="timer-value" id="timerValue">00:00:00</div>
      <div style="display:flex;justify-content:center;margin-top:12px">
        <div class="status-badge idle" id="statusBadge">
          <div class="dot" id="statusDot"></div>
          <span id="statusText">Не активно</span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-meta"><span>0</span><span id="limitLabel">2ч 00м</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="card" id="controlsCard" style="display:none">
    <div class="controls">
      <button class="btn btn-start" id="btnStart" onclick="timerStart()">▶ Старт</button>
      <button class="btn btn-pause" id="btnPause" onclick="timerPause()" disabled>⏸ Пауза</button>
      <button class="btn btn-stop"  id="btnStop"  onclick="timerStop()"  disabled>⏹ Стоп</button>
    </div>
    <div class="divider" style="margin-top:16px"></div>
    <div class="limit-row">
      <div class="limit-label">Дневной лимит <span>часов за день</span></div>
      <div class="limit-input-wrap">
        <button class="limit-btn" onclick="changeLimit(-0.5)">−</button>
        <div class="limit-value" id="limitDisplay">2ч 00м</div>
        <button class="limit-btn" onclick="changeLimit(0.5)">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="log-title">Сессии за сегодня</div>
    <div id="sessionLog"><div class="log-empty">Сессий пока нет</div></div>
  </div>

  <div id="resetWrap" style="display:none">
    <button class="btn-reset" onclick="resetDay()">↺ Сбросить день</button>
  </div>
  <div class="child-note" id="childNote" style="display:none">👁 Режим просмотра — управление у родителя</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  // ============================================================
  var FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAdQTeWKu6lYq66AwopTy9qJzkxCFUCp1Q",
    authDomain:        "conchome.firebaseapp.com",
    databaseURL:       "https://conchome-default-rtdb.firebaseio.com",
    projectId:         "conchome",
    storageBucket:     "conchome.firebasestorage.app",
    messagingSenderId: "349487445928",
    appId:             "1:349487445928:web:36f5630a94eee69058cf9d"
  };
  // PIN хранится в Firebase: Realtime Database → config → pin
  // В коде его нет — установите через Firebase Console вручную
  // ============================================================

  var PARENT_PIN = null; // загружается из Firebase при старте

  var isParent = false;
  var stateRef = null;
  var tickTimer = null;

  var state = defaultState();

  function todayStr() { return new Date().toISOString().slice(0,10); }

  function defaultState() {
    return {
      status: "idle",
      accumulatedSec: 0,
      currentStart: null,
      limitHours: 2,
      sessions: [],
      day: todayStr()
    };
  }

  // Считаем реальное время на текущий момент
  function calcTotal(s) {
    var acc = s.accumulatedSec || 0;
    if (s.status === 'running' && s.currentStart) {
      acc += Math.floor((Date.now() - s.currentStart) / 1000);
    }
    return acc;
  }

  // ── PIN ──────────────────────────────────────────────────────
  var pinBuffer = "";
  function pinPress(d) {
    if (pinBuffer.length >= 4) return;
    pinBuffer += d; updatePinDots(false);
    if (pinBuffer.length === 4) setTimeout(checkPin, 150);
  }
  function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(false); document.getElementById('pinError').textContent=''; }
  function viewAsChild() { isParent = false; showApp(); }
  function updatePinDots(error) {
    for (var i=0;i<4;i++) {
      document.getElementById('d'+i).className = 'pin-dot'+(error?' error':(i<pinBuffer.length?' filled':''));
    }
  }
  function checkPin() {
    if (!PARENT_PIN) {
      document.getElementById('pinError').textContent = 'Загрузка PIN...';
      pinBuffer = ''; updatePinDots(false); return;
    }
    if (pinBuffer === PARENT_PIN) { isParent = true; showApp(); }
    else {
      updatePinDots(true);
      document.getElementById('pinError').textContent = 'Неверный PIN';
      setTimeout(function(){ pinBuffer=''; updatePinDots(false); document.getElementById('pinError').textContent=''; }, 1000);
    }
  }

  // ── BOOT — загружаем PIN из Firebase при старте страницы ─────
  function boot() {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      var db = firebase.database();
      stateRef = db.ref('screentime');
      db.ref('config/pin').once('value', function(snap) {
        var pin = snap.val();
        if (pin) {
          PARENT_PIN = String(pin);
        } else {
          document.getElementById('pinError').textContent = 'PIN не задан в Firebase (config/pin)';
        }
      }, function(err) {
        document.getElementById('pinError').textContent = 'Ошибка Firebase: ' + err.message;
      });
    } catch(e) {
      document.getElementById('pinError').textContent = 'Ошибка: ' + e.message;
    }
  }

  // ── INIT ─────────────────────────────────────────────────────
  function showApp() {
    document.getElementById('pinOverlay').style.display  = 'none';
    document.getElementById('app').style.display         = 'flex';
    document.getElementById('controlsCard').style.display = isParent ? 'block' : 'none';
    document.getElementById('resetWrap').style.display    = isParent ? 'block' : 'none';
    document.getElementById('childNote').style.display    = isParent ? 'none'  : 'block';

    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      var db = firebase.database();
      stateRef = db.ref('screentime');

      // Слушаем Firebase — обновляем state при изменении с другого устройства
      stateRef.on('value', function(snap) {
        var data = snap.val();
        if (!data || data.day !== todayStr()) {
          // Новый день или пусто — сбрасываем
          var fresh = defaultState();
          fresh.limitHours = (data && data.limitHours) ? data.limitHours : 2;
          stateRef.set(fresh);
          return;
        }
        state = data;
        startLocalTick();
        renderState();
      }, function(err) {
        showDbError('Ошибка Firebase: ' + err.message + '. Проверьте Rules в Realtime Database.');
      });

    } catch(e) {
      showDbError('Не удалось подключиться к Firebase: ' + e.message);
    }
  }

  function showDbError(msg) {
    var el = document.getElementById('dbError');
    el.style.display = 'block';
    el.textContent = '❌ ' + msg;
  }

  // Локальный тик — только для плавного обновления экрана, НЕ пишет в Firebase
  function startLocalTick() {
    if (tickTimer) clearInterval(tickTimer);
    if (state.status === 'running') {
      tickTimer = setInterval(function() { renderState(); }, 1000);
    }
  }

  // Запись в Firebase — только при действиях пользователя
  function pushState(s) {
    state = s;
    if (stateRef) stateRef.set(s);
    startLocalTick();
    renderState();
  }

  // ── CONTROLS ─────────────────────────────────────────────────
  function timerStart() {
    if (state.status === 'running') return;
    pushState(Object.assign({}, state, { status:'running', currentStart: Date.now() }));
  }

  function timerPause() {
    if (state.status !== 'running') return;
    var elapsed = Math.floor((Date.now() - state.currentStart) / 1000);
    var sessions = addSessionToLog(state, elapsed);
    pushState(Object.assign({}, state, {
      status: 'paused',
      accumulatedSec: (state.accumulatedSec||0) + elapsed,
      currentStart: null,
      sessions: sessions
    }));
  }

  function timerStop() {
    if (state.status === 'idle') return;
    var elapsed = state.status === 'running' ? Math.floor((Date.now() - state.currentStart) / 1000) : 0;
    var sessions = state.status === 'running' ? addSessionToLog(state, elapsed) : (state.sessions||[]);
    pushState(Object.assign({}, state, {
      status: 'idle',
      accumulatedSec: (state.accumulatedSec||0) + elapsed,
      currentStart: null,
      sessions: sessions
    }));
  }

  function changeLimit(delta) {
    pushState(Object.assign({}, state, {
      limitHours: Math.max(0.5, Math.min(12, (state.limitHours||2) + delta))
    }));
  }

  function resetDay() {
    if (!confirm('Сбросить весь прогресс за сегодня?')) return;
    pushState(Object.assign(defaultState(), { limitHours: state.limitHours||2 }));
  }

  function addSessionToLog(st, elapsed) {
    if (!elapsed || elapsed <= 0) return st.sessions||[];
    var sessions = (st.sessions||[]).slice();
    sessions.push({
      start: new Date(st.currentStart).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}),
      dur: elapsed
    });
    return sessions;
  }

  // ── RENDER ───────────────────────────────────────────────────
  function pad(n) { return String(n).padStart(2,'0'); }
  function fmtSec(sec) { return pad(Math.floor(sec/3600))+':'+pad(Math.floor((sec%3600)/60))+':'+pad(sec%60); }
  function fmtDur(sec) {
    var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    return h>0?h+'ч '+pad(m)+'м':pad(m)+'м '+pad(s)+'с';
  }
  function fmtLimit(h) {
    var lh=Math.floor(h),lm=Math.round((h-lh)*60);
    return lm>0?lh+'ч '+lm+'м':lh+'ч 00м';
  }

  function renderState() {
    var sec    = calcTotal(state);
    var lim    = (state.limitHours||2) * 3600;
    var pct    = Math.min(100, (sec/lim)*100);
    var isOver = sec >= lim;
    var isWarn = pct >= 80 && !isOver;

    document.getElementById('timerValue').textContent = fmtSec(sec);
    document.getElementById('timerValue').className =
      'timer-value'+(state.status==='running'?(isOver?' over':isWarn?' warning':' running'):'');

    var ls = fmtLimit(state.limitHours||2);
    document.getElementById('limitLabel').textContent   = ls;
    document.getElementById('limitDisplay').textContent = ls;

    var pf = document.getElementById('progressFill');
    pf.style.width = pct+'%';
    pf.className = 'progress-fill'+(isOver?' over':isWarn?' warning':'');

    document.getElementById('statusBadge').className = 'status-badge '+(isOver?'over':state.status);
    document.getElementById('statusDot').className   = 'dot'+(state.status==='running'?' pulse':'');
    document.getElementById('statusText').textContent =
      isOver?'Лимит исчерпан':state.status==='running'?'В сети':state.status==='paused'?'Пауза':'Не активно';

    document.getElementById('overtimeAlert').style.display = isOver?'flex':'none';

    if (isParent) {
      document.getElementById('btnStart').disabled = state.status==='running';
      document.getElementById('btnPause').disabled = state.status!=='running';
      document.getElementById('btnStop').disabled  = state.status==='idle';
    }

    var sessions = state.sessions||[];
    document.getElementById('sessionLog').innerHTML = sessions.length===0
      ?'<div class="log-empty">Сессий пока нет</div>'
      :sessions.slice().reverse().map(function(s){
          return '<div class="log-item"><span>Сессия с '+s.start+'</span><span class="log-dur">'+fmtDur(s.dur)+'</span></div>';
        }).join('');

    document.getElementById('dateDisplay').textContent =
      new Date().toLocaleDateString('ru',{weekday:'long',day:'numeric',month:'long'});
  }
  boot();
</script>
</body>
</html>
